version: '3.8'

services:
  # Local persistent database service
  mongodb:
    image: mongo:6.0
    container_name: saas_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - saas_network

  # Node Express backend microservice
  backend:
    build: ./backend
    container_name: saas_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb+srv://bishakira595_db_user:GmB5tUcEy7ROZCEu@cluster0.s6ocq3a.mongodb.net/?appName=Cluster0
      - JWT_SECRET=supersecretjwtsecretkeychangeinproduction
      - GEMINI_API_KEY=AIzaSyAm8d4VPOli7X5mVzPJJGVg0WR0oGdVPmc
    depends_on:
      - mongodb
    networks:
      - saas_network

  # Next.js frontend application
  frontend:
    build: ./frontend
    container_name: saas_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - saas_network

networks:
  saas_network:
    driver: bridge

volumes:
  mongo_data:
